<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Поиск и кнопка -->
  <div class="top-bar">
    <input type="text" id="searchInput" placeholder="Поиск...">
    <button id="addBtn">＋</button>
  </div>

  <!-- Фильтры -->
  <div class="filters">
    <button class="filter-btn active">Все</button>
    <button class="filter-btn">Рендеры</button>
    <button class="filter-btn">Интерьеры</button>
    <button class="filter-btn">Текстуры</button>
    <button class="filter-btn">Референсы</button>
  </div>

  <!-- Сетка пинов -->
  <div id="pinGrid" class="pin-grid"></div>

  <!-- Модальное окно -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h2>Добавить пин</h2>
      <input type="text" id="pinUrl" placeholder="Ссылка на картинку">
      <input type="text" id="pinTitle" placeholder="Название (необязательно)">
      <div class="categories">
        <button class="cat-btn" data-cat="Рендеры">Рендеры</button>
        <button class="cat-btn" data-cat="Интерьеры">Интерьеры</button>
        <button class="cat-btn" data-cat="Текстуры">Текстуры</button>
        <button class="cat-btn" data-cat="Референсы">Референсы</button>
      </div>
      <button onclick="savePin()" class="save-btn">Сохранить</button>
    </div>
  </div>

  <!-- Скрипт ОБЯЗАТЕЛЬНО внизу и с правильным тегом -->
  <script src="script.js"></script>

</body>
</html>
