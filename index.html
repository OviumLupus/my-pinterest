<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЦБТСтерест</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <header class="header">
    <div class="header__logo">✦ ЦБТСтерест</div>
    <input type="text" class="header__search" id="searchInput" placeholder="Поиск...">
    <button class="header__add-btn" id="addPinBtn">＋</button>
  </header>

  <div class="filters">
    <button class="filters__btn active" data-category="all">Все</button>
    <button class="filters__btn" data-category="refs">Рефы</button>
    <button class="filters__btn" data-category="model">Модель</button>
    <button class="filters__btn" data-category="sketches">Скетчи</button>
    <button class="filters__btn" data-category="artifacts">Артефакты</button>
  </div>

  <div class="pins-grid" id="pinsGrid"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 class="modal__title">Новый пин</h2>
      <input type="text" class="modal__input" id="pinTitle" placeholder="Название">
      <input type="url" class="modal__input" id="pinImage" placeholder="Ссылка на картинку">
      <select class="modal__select" id="pinCategory">
        <option value="refs">Рефы</option>
        <option value="model">Модель</option>
        <option value="sketches">Скетчи</option>
        <option value="artifacts">Артефакты</option>
      </select>
      <div class="modal__buttons">
        <button class="modal__btn modal__btn--cancel" id="cancelBtn">Отмена</button>
        <button class="modal__btn modal__btn--save" id="saveBtn">Добавить</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
